<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∿ ambient portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=VT323&family=Libre+Baskerville:ital@1&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:   #07070c;
  --paper: #ede8df;
  --gold:  #c8a040;
  --rust:  #9b3d2b;
  --sage:  #4a6040;
}

html { scroll-behavior: auto; }
body {
  background: var(--ink);
  color: var(--paper);
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── STARFIELD ── */
#bg-canvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.8rem 3rem;
}
.nav-logo {
  font-family: 'VT323', monospace;
  font-size: 1.6rem; letter-spacing: 0.1em;
  color: rgba(237,232,223,0.6);
  cursor: pointer; text-decoration: none;
  transition: color .3s;
}
.nav-logo:hover { color: var(--paper); }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a {
  font-family: 'VT323', monospace;
  font-size: 1rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(237,232,223,0.38); text-decoration: none;
  cursor: pointer; transition: color .3s;
}
.nav-links a:hover { color: var(--paper); }

/* ── SCROLL SCENE ── */
#scene { position: relative; }
#viewport {
  position: sticky; top: 0; height: 100vh;
  overflow: hidden; z-index: 1;
}
#world {
  position: absolute; top: 0; left: 0; width: 100%;
  will-change: transform;
}

/* ── ELEMENT BASE ── */
.el {
  position: absolute;
  pointer-events: none;
  will-change: transform, opacity;
  user-select: none;
  opacity: 0;
}

/* ── TEXT STYLES ── */
.t-massive {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: clamp(4rem, 12vw, 14rem);
  line-height: .88; white-space: nowrap;
}
.t-large {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: clamp(1.8rem, 4.5vw, 5rem); line-height: .95;
}
.t-body {
  font-family: 'Libre Baskerville', serif; font-style: italic;
  font-size: clamp(.82rem, 1.3vw, 1.15rem);
  line-height: 1.65; max-width: 300px;
}
.t-mono {
  font-family: 'VT323', monospace;
  font-size: clamp(.65rem, 1vw, .88rem);
  letter-spacing: .25em; text-transform: uppercase;
}

/* ── VISUAL ELEMENTS ── */
.cover { overflow: hidden; border: 1px solid rgba(237,232,223,.12); }
.cover svg { display: block; width: 100%; height: 100%; }
.photo  { overflow: hidden; border: 1px solid rgba(237,232,223,.07);
          filter: grayscale(.3) contrast(1.08) brightness(.9); }
.photo  svg { display: block; width: 100%; height: 100%; }
.line { background: rgba(237,232,223,.18); transform-origin: left center; }
.dot  { border-radius: 50%; }
.ring { border-radius: 50%; border: 1px solid rgba(237,232,223,.1); background: transparent; }

/* ══════════════════════════════
   SUBPAGES OVERLAY
══════════════════════════════ */
#subpages {
  display: none; position: fixed; inset: 0;
  background: var(--ink); z-index: 2000; overflow-y: auto;
}
#subpages.open { display: block; }

.sp-close {
  position: fixed; top: 1.8rem; right: 3rem;
  font-family: 'VT323', monospace; font-size: 1rem;
  letter-spacing: .25em; text-transform: uppercase;
  color: rgba(237,232,223,.35); cursor: pointer;
  z-index: 2001; transition: color .3s;
}
.sp-close:hover { color: var(--paper); }

.sp-inner {
  min-height: 100vh;
  padding: 7rem 5vw 6rem;
  max-width: 1200px; margin: 0 auto;
}
.sp-h {
  font-family: 'IM Fell English', serif; font-style: italic;
  font-size: clamp(3rem, 8vw, 9rem); line-height: .88;
  color: var(--paper); margin-bottom: 4rem;
}

/* — projects — */
.pj-list { border-top: 1px solid rgba(237,232,223,.07); }
.pj-row {
  display: flex; align-items: baseline; gap: 2rem;
  padding: 1.8rem 0;
  border-bottom: 1px solid rgba(237,232,223,.06);
  cursor: pointer;
  transition: padding-left .4s cubic-bezier(.23,1,.32,1);
}
.pj-row:hover { padding-left: 1.5rem; }
.pj-n { font-family:'VT323',monospace; font-size:.78rem; color:rgba(237,232,223,.22); min-width:3rem; }
.pj-name { font-family:'IM Fell English',serif; font-style:italic; font-size:clamp(1.6rem,3.5vw,3.2rem); flex:1; }
.pj-sub  { font-family:'VT323',monospace; font-size:.72rem; letter-spacing:.12em; color:var(--gold); text-transform:uppercase; }

/* — products — */
.pr-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:2.5rem; }
.pr-card { cursor:pointer; }
.pr-art  { aspect-ratio:1; border:1px solid rgba(237,232,223,.07); overflow:hidden; margin-bottom:1rem; transition:border-color .3s; }
.pr-card:hover .pr-art { border-color:rgba(200,160,64,.3); }
.pr-art svg { display:block; width:100%; height:100%; }
.pr-title { font-family:'IM Fell English',serif; font-style:italic; font-size:1.15rem; margin-bottom:.3rem; }
.pr-fmt   { font-family:'VT323',monospace; font-size:.7rem; letter-spacing:.15em; color:rgba(237,232,223,.28); text-transform:uppercase; }
.pr-price { font-family:'VT323',monospace; font-size:1rem; color:var(--gold); margin-top:.4rem; }

/* — about — */
.ab-grid { display:grid; grid-template-columns:1fr 1.7fr; gap:5rem; align-items:start; }
.ab-portrait {
  aspect-ratio:3/4;
  background:linear-gradient(145deg,#180d10,#0a0f18);
  border:1px solid rgba(237,232,223,.07);
  display:flex; align-items:center; justify-content:center;
  font-family:'VT323',monospace; font-size:.7rem; letter-spacing:.2em;
  color:rgba(237,232,223,.18);
}
.ab-text p { font-family:'Libre Baskerville',serif; font-style:italic; font-size:1rem; line-height:1.9; color:rgba(237,232,223,.6); margin-bottom:1.4rem; }

/* — gallery — */
.gl-cols { columns:3; column-gap:3px; }
.gl-item { break-inside:avoid; margin-bottom:3px; overflow:hidden; cursor:pointer; }
.gl-in   { transition:transform .6s cubic-bezier(.23,1,.32,1); }
.gl-item:hover .gl-in { transform:scale(1.04); }
.gl-in svg { display:block; width:100%; }

/* — contact — */
.ct-body { max-width:560px; }
.ct-intro { font-family:'Libre Baskerville',serif; font-style:italic; font-size:1rem; line-height:1.85; color:rgba(237,232,223,.48); margin-bottom:3rem; }
.ct-row {
  display:flex; gap:2rem; align-items:baseline;
  padding:1.2rem 0; border-bottom:1px solid rgba(237,232,223,.06);
  cursor:pointer; text-decoration:none; color:inherit;
  transition:gap .4s cubic-bezier(.23,1,.32,1);
}
.ct-row:hover { gap:3rem; }
.ct-lbl { font-family:'VT323',monospace; font-size:.7rem; letter-spacing:.2em; color:var(--gold); text-transform:uppercase; min-width:80px; }
.ct-val { font-family:'IM Fell English',serif; font-style:italic; font-size:1.05rem; color:rgba(237,232,223,.62); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: rgba(200,160,64,.25); border-radius: 2px; }

/* ── SELECTION ── */
::selection { background: rgba(200,160,64,.18); color: var(--paper); }

@media (max-width:768px) {
  nav { padding: 1.3rem 1.5rem; }
  .nav-links { gap: 1.2rem; }
  .nav-links a { font-size: .85rem; }
  .gl-cols { columns: 2; }
  .ab-grid { grid-template-columns: 1fr; gap: 2.5rem; }
}
@media (max-width:480px) {
  .nav-links { display: none; }
  .gl-cols { columns: 1; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav>
  <a class="nav-logo" onclick="closeSub()">∿</a>
  <ul class="nav-links">
    <li><a onclick="openSub('projects')">Projekty</a></li>
    <li><a onclick="openSub('products')">Produkty</a></li>
    <li><a onclick="openSub('about')">O mnie</a></li>
    <li><a onclick="openSub('gallery')">Galeria</a></li>
    <li><a onclick="openSub('contact')">Kontakt</a></li>
  </ul>
</nav>

<div id="scene">
  <div id="viewport">
    <div id="world"></div>
  </div>
</div>

<div id="subpages">
  <span class="sp-close" onclick="closeSub()">✕ zamknij</span>
  <div class="sp-inner" id="sp-content"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   HELPERS  (defined first — used everywhere)
═══════════════════════════════════════════ */
const rnd  = (a, b) => a + Math.random() * (b - a);
const pick = arr   => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

let VW = window.innerWidth;
let VH = window.innerHeight;
window.addEventListener('resize', () => { VW = window.innerWidth; VH = window.innerHeight; });

/* ═══════════════════════════════════════════
   STARFIELD
═══════════════════════════════════════════ */
(function () {
  const c   = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H;
  const resize = () => { W = c.width = window.innerWidth; H = c.height = window.innerHeight; };
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({ length: 240 }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.3 + 0.15,
    a: Math.random() * 0.44 + 0.04,
    ph: Math.random() * Math.PI * 2,
    spd: Math.random() * 0.0007 + 0.0002,
  }));

  let t = 0;
  (function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const a = s.a * (0.6 + 0.4 * Math.sin(t * s.spd * 60 + s.ph));
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(237,232,223,${a})`;
      ctx.fill();
    });
    t++;
    requestAnimationFrame(draw);
  })();
})();

/* ═══════════════════════════════════════════
   ALBUM DATA
═══════════════════════════════════════════ */
const ALBUMS = [
  { title:'Puste Niebo',          year:'2019', tags:['drone','field recording','ambient'],
    desc:'Zapis ciszy przed burzą. Warstwy dronów i nagrania terenowe.',
    color:'#c8a040', bg1:'#0d0d1f', bg2:'#1a0e2e' },
  { title:'Szlest',               year:'2019', tags:['urban','noise','experimental'],
    desc:'Miejska noc — szelest liści, metaliczny oddech wentylacji.',
    color:'#9b3d2b', bg1:'#1a0e08', bg2:'#2a1408' },
  { title:'Nota contra Notam',    year:'2020', tags:['counterpoint','minimalism','structure'],
    desc:'Dwa głosy prowadzone niezależnie. Kontrapunkt jako filozofia.',
    color:'#5a8a3a', bg1:'#0a1408', bg2:'#0d1e0a' },
  { title:'Among Other Sounds',   year:'2021', tags:['collaborative','improvisation','global'],
    desc:'Kolektywna improwizacja ponad granicami kontynentów.',
    color:'#8a3a9a', bg1:'#120810', bg2:'#1e0e18' },
  { title:'Drumless Blond Heads', year:'2021', tags:['beatless','texture','drift'],
    desc:'Kiedy zniknie rytm — zostaje czas.',
    color:'#3a8aaa', bg1:'#080d14', bg2:'#0e1520' },
  { title:'Fioletowe Trójkąty',   year:'2022', tags:['spatial audio','electronic','geometry'],
    desc:'Dźwięk ma kształt — tylko wzrok nam to ukrywa.',
    color:'#aa3aaa', bg1:'#100810', bg2:'#1a0e1a' },
  { title:'Zielone Fale',         year:'2022', tags:['memory','synthesis','personal'],
    desc:'Pamięć zakodowana w fali dźwiękowej.',
    color:'#3aaa5a', bg1:'#081008', bg2:'#0d1a0e' },
  { title:'Czerwone Południe',    year:'2023', tags:['heat','drone','mediterranean'],
    desc:'Upał jako dźwięk — cisza sjesty jako struktura.',
    color:'#cc3030', bg1:'#150808', bg2:'#200e0a' },
  { title:'Granica Słyszalności', year:'2023', tags:['infrasound','perception','limit'],
    desc:'Co kryje się poza granicami naszych zmysłów?',
    color:'#4a5aaa', bg1:'#080a14', bg2:'#0e1022' },
  { title:'Punkt Zerowy',         year:'2024', tags:['retrospective','silence','return'],
    desc:'Każda podróż, która ma sens, wraca tam skąd wyruszyła.',
    color:'#c8a040', bg1:'#100e08', bg2:'#1a1810' },
];

/* ═══════════════════════════════════════════
   SVG GENERATORS
═══════════════════════════════════════════ */
function coverSVG(a, seed) {
  const { color: ac, bg1: c1, bg2: c2 } = a;
  const id = 'g' + seed;
  const designs = [
    // 0 — concentric rings
    `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="${id}"><stop offset="0%" stop-color="${c2}"/><stop offset="100%" stop-color="${c1}"/></radialGradient></defs>
      <rect width="300" height="300" fill="url(#${id})"/>
      ${[130,100,72,48,28,12].map((r,i)=>`<circle cx="150" cy="150" r="${r}" fill="none" stroke="${ac}" stroke-width=".7" opacity="${(.07+i*.05).toFixed(2)}"/>`).join('')}
      <circle cx="150" cy="150" r="4" fill="${ac}" opacity=".7"/>
    </svg>`,
    // 1 — wave interference
    `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>
      <rect width="300" height="300" fill="url(#${id})"/>
      ${Array.from({length:14},(_,i)=>{const y=75+i*13,a=8+i*3;return `<path d="M0,${y} Q75,${y-a} 150,${y} T300,${y}" fill="none" stroke="${ac}" stroke-width=".8" opacity="${(.03+i*.018).toFixed(3)}"/>`;}).join('')}
    </svg>`,
    // 2 — diagonal grid
    `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="${c1}"/>
      ${Array.from({length:9},(_,i)=>`<line x1="${i*38}" y1="0" x2="${i*38+240}" y2="300" stroke="${ac}" stroke-width=".6" opacity="${(.05+i*.018).toFixed(3)}"/>`).join('')}
      ${Array.from({length:5},(_,i)=>`<line x1="${i*80}" y1="300" x2="${i*80+200}" y2="0" stroke="${ac}" stroke-width=".4" opacity=".04"/>`).join('')}
      <rect x="100" y="100" width="100" height="100" fill="none" stroke="${ac}" stroke-width=".8" opacity=".22"/>
    </svg>`,
    // 3 — scatter field
    `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="${c1}"/>
      ${Array.from({length:48},()=>{const x=Math.random()*280+10,y=Math.random()*280+10,r=Math.random()*4+.6;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="${ac}" opacity="${(Math.random()*.28+.04).toFixed(2)}"/>`;}).join('')}
      <circle cx="150" cy="150" r="55" fill="none" stroke="${ac}" stroke-width=".5" opacity=".18"/>
    </svg>`,
    // 4 — nested triangles
    `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="${c1}"/>
      ${[['150,42 262,238 38,238'],['150,74 240,222 60,222'],['150,106 218,206 82,206'],['150,133 196,190 104,190']].map((p,i)=>`<polygon points="${p}" fill="none" stroke="${ac}" stroke-width="${(.9-i*.18).toFixed(2)}" opacity="${(.26-i*.05).toFixed(2)}"/>`).join('')}
    </svg>`,
  ];
  return designs[seed % designs.length];
}

function photoSVG(seed) {
  const palettes = [
    ['#0d1520','#1a2535'], ['#150d08','#2a1a10'],
    ['#08100a','#10180e'], ['#12080e','#201018'], ['#0a0c14','#101422'],
  ];
  const [c1, c2] = palettes[seed % palettes.length];
  const id = 'ph' + seed;
  const types = [
    `<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>
      <rect width="400" height="280" fill="url(#${id})"/>
      <ellipse cx="${140+(seed%5)*14}" cy="160" rx="${68+(seed%4)*9}" ry="${50+(seed%3)*6}" fill="none" stroke="rgba(237,232,223,.06)" stroke-width="35"/>
      <rect x="0" y="224" width="400" height="56" fill="rgba(0,0,0,.4)"/>
    </svg>`,
    `<svg viewBox="0 0 280 370" xmlns="http://www.w3.org/2000/svg">
      <rect width="280" height="370" fill="${c1}"/>
      ${Array.from({length:7},(_,i)=>`<rect x="0" y="${i*54}" width="280" height="27" fill="rgba(237,232,223,${(.012+i*.004).toFixed(3)})"/>`).join('')}
      <rect x="55" y="75" width="170" height="220" fill="rgba(237,232,223,.04)" stroke="rgba(237,232,223,.07)" stroke-width=".5"/>
    </svg>`,
    `<svg viewBox="0 0 460 320" xmlns="http://www.w3.org/2000/svg">
      <rect width="460" height="320" fill="${c2}"/>
      <path d="M0,200 Q115,118 230,200 T460,200 L460,320 L0,320Z" fill="rgba(0,0,0,.42)"/>
      <circle cx="230" cy="128" r="72" fill="none" stroke="rgba(237,232,223,.06)" stroke-width="1"/>
    </svg>`,
    `<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <rect width="320" height="320" fill="${c1}"/>
      ${Array.from({length:5},(_,i)=>{const r=28+i*36;return `<circle cx="160" cy="160" r="${r}" fill="none" stroke="rgba(237,232,223,${(.04+i*.016).toFixed(3)})" stroke-width=".6"/>`;}).join('')}
      <rect x="98" y="98" width="124" height="124" fill="rgba(237,232,223,.03)" stroke="rgba(237,232,223,.06)" stroke-width=".5"/>
    </svg>`,
  ];
  return types[seed % types.length];
}

/* ═══════════════════════════════════════════
   WORLD BUILDER
═══════════════════════════════════════════ */
const world = document.getElementById('world');
const scene = document.getElementById('scene');

const BANDS_PER_ALBUM = 2.8;   // viewport-heights each album occupies
const WORLD_VH = ALBUMS.length * BANDS_PER_ALBUM + 2;   // +2 = padding top/bottom

function worldPX()  { return WORLD_VH * VH; }
function scrollPX() { return worldPX() - VH; }

// Set scrollable height
function setSceneH() { scene.style.height = (worldPX() + VH) + 'px'; }
setSceneH();
window.addEventListener('resize', setSceneH);

// Element registry
const ELEMS = [];

function placeEl(node, worldY, parallax, baseOp, rot, driftAX, driftAY) {
  node.style.position = 'absolute';
  node.style.top      = worldY + 'px';
  node.style.opacity  = '0';
  world.appendChild(node);
  ELEMS.push({
    node, worldY, parallax, baseOp, rot,
    driftAmpX: driftAX ?? rnd(3, 9),
    driftAmpY: driftAY ?? rnd(2, 6),
    driftPhase: Math.random() * Math.PI * 2,
    driftSpeed: rnd(0.0003, 0.0009),
  });
}

function mkDiv(cls, text, color) {
  const d = document.createElement('div');
  d.className = 'el ' + cls;
  if (text)  d.textContent = text;
  if (color) d.style.color = color;
  return d;
}

/* ── AMBIENT GHOST WORDS ── */
const GHOSTS = [
  'silence','echo','pulse','void','drift','breath','static','grain',
  'cisza','oddech','szum','mgła','fala','puls','pustka','czas',
  'resonance','dissolve','membrane','threshold','∿','◦','—','·',
  'nagrania terenowe','field recording','ambient','experimental',
  'slow listening','all frequencies','no beat','deep time',
];
for (let i = 0; i < 80; i++) {
  const yFrac = rnd(0.005, 0.995);
  const n = mkDiv('t-mono', pick(GHOSTS), 'rgba(237,232,223,.09)');
  n.style.left = rnd(2, 87) + 'vw';
  placeEl(n, yFrac * worldPX(), rnd(.5, 1.35), rnd(.04, .14), rnd(-30, 30));
}

/* ── FLOATING PHRASES between albums ── */
const PHRASES = [
  { cls:'t-large', text:'każdy dźwięk jest śladem',       col:'rgba(237,232,223,.7)' },
  { cls:'t-body',  text:'the space between notes is where music lives', col:'rgba(237,232,223,.6)' },
  { cls:'t-large', text:'co zostaje po ciszy',             col:'rgba(200,160,64,.65)' },
  { cls:'t-mono',  text:'field recording 2019 — 2024',     col:'rgba(237,232,223,.4)' },
  { cls:'t-body',  text:'ambient music is not background — it is the foreground of the mind', col:'rgba(237,232,223,.55)' },
  { cls:'t-large', text:'muzyka bez początku',             col:'rgba(237,232,223,.6)' },
  { cls:'t-mono',  text:'experimental — adj — not yet resolved', col:'rgba(200,160,64,.5)' },
  { cls:'t-body',  text:'fotografia jako forma słuchania przestrzeni', col:'rgba(237,232,223,.58)' },
  { cls:'t-large', text:'dźwięk / obraz / czas',           col:'rgba(237,232,223,.55)' },
  { cls:'t-body',  text:'każde miejsce ma swój własny głos', col:'rgba(237,232,223,.6)' },
  { cls:'t-mono',  text:'ten projekt trwa nadal',          col:'rgba(200,160,64,.55)' },
  { cls:'t-large', text:'a journey through sound',         col:'rgba(237,232,223,.5)' },
  { cls:'t-body',  text:'nie nagrywam muzyki — nagrywam miejsca', col:'rgba(237,232,223,.65)' },

PHRASES.forEach((f, fi) => {
  const yFrac = (fi + 0.5) / PHRASES.length;
  const n = mkDiv('t-body' === f.cls ? 't-body' : f.cls, f.text, f.col);
  // force exact class
  n.className = 'el ' + f.cls;
  n.textContent = f.text;
  n.style.color  = f.col;
  n.style.left   = rnd(3, 52) + 'vw';
  placeEl(n, yFrac * worldPX() + rnd(-VH*.4, VH*.4),
    rnd(.7, 1.05), f.cls === 't-large' ? rnd(.35,.72) : rnd(.4,.75), rnd(-5,5));

/* ── PER-ALBUM CLUSTERS ── */
ALBUMS.forEach((album, ai) => {
  const bandStartPX = (1 + ai * BANDS_PER_ALBUM) * VH;

  // 1. MASSIVE TITLE
  const titleN = mkDiv('t-massive', album.title, album.color);
  titleN.style.left = rnd(-VW * .06, VW * .04) + 'px';
  placeEl(titleN, midPX - VH * .55, rnd(.8,.9), .9, rnd(-5,5), rnd(6,14));

  // 2. YEAR
  const yearN = mkDiv('t-mono', album.year, 'rgba(237,232,223,.34)');
  yearN.style.left = rnd(VW*.1, VW*.68) + 'px';
  placeEl(yearN, midPX - VH*.38 + rnd(-28,28), rnd(1.06,1.2), .52, rnd(-2,2));

  // 3. DESCRIPTION
  const descN = mkDiv('t-body', album.desc, 'rgba(237,232,223,.68)');
  descN.style.left = rnd(VW*.03, VW*.52) + 'px';
  placeEl(descN, midPX + rnd(-VH*.12,VH*.18), rnd(.9,.98), .72, rnd(-2,2), 3, rnd(4,8));

  // 4. TAGS
  album.tags.forEach((tag, ti) => {
    const tagN = mkDiv('t-mono', '— ' + tag, album.color);
    tagN.style.left = rnd(VW*.04, VW*.74) + 'px';
    placeEl(tagN, midPX + VH*(.18+ti*.14) + rnd(-24,24), rnd(.85,1.1), rnd(.28,.54), rnd(-3,3));
  });

  // 5. MAIN COVER
  const cSz  = Math.round(VW * rnd(.19,.3));
  const cDiv = mkDiv('cover', '', '');
  cDiv.style.width  = cSz + 'px';
  cDiv.style.height = cSz + 'px';
  cDiv.innerHTML    = coverSVG(album, ai);
  const cX = rnd(VW*.28, VW*.58);
  cDiv.style.left = cX + 'px';
  placeEl(cDiv, midPX - cSz*.5, rnd(.7,.83), .95, rnd(-9,9), rnd(4,10), rnd(3,7));

  // 6. SECOND COVER (smaller)
  const c2Sz  = Math.round(cSz * rnd(.42,.62));
  const c2Div = mkDiv('cover', '', '');
  c2Div.style.width  = c2Sz + 'px';
  c2Div.style.height = c2Sz + 'px';
  c2Div.innerHTML    = coverSVG(album, ai + 10);
  c2Div.style.left   = (cX + cSz + rnd(-c2Sz*.1, c2Sz*.65)) + 'px';
  placeEl(c2Div, midPX + rnd(-VH*.35,VH*.15), rnd(1.05,1.18), rnd(.38,.65), rnd(-20,20), rnd(6,13));

  // 7. GHOST ECHO of title (very transparent)
  const echoN = mkDiv('t-massive', album.title, album.color);
  echoN.style.left    = rnd(VW*.04, VW*.15) + 'px';
  echoN.style.opacity = '0';
  placeEl(echoN, midPX + VH*.3, rnd(1.12,1.28), rnd(.05,.11), rnd(-9,9));

  // 8. PHOTOS (2–3)
  const nPh = pick([2, 3]);
  for (let pi = 0; pi < nPh; pi++) {
    const pw    = Math.round(VW * rnd(.1,.26));
    const ph    = Math.round(pw * rnd(.6,1.55));
    const phDiv = mkDiv('photo', '', '');
    phDiv.style.width  = pw + 'px';
    phDiv.style.height = ph + 'px';
    phDiv.innerHTML    = photoSVG(ai * 4 + pi);
    phDiv.style.left   = rnd(VW*.01, VW*.72) + 'px';
    placeEl(phDiv, midPX + rnd(-VH*.7,VH*.55), rnd(.65,1.22), rnd(.38,.72), rnd(-15,15), rnd(3,9), rnd(2,6));
  }

  // 9. LINES
  for (let li = 0; li < 4; li++) {
    const lineDiv = mkDiv('line', '', '');
    const horiz   = Math.random() > .35;
    const len     = rnd(38, VW*.28);
    lineDiv.style.width      = horiz ? len+'px' : '1px';
    lineDiv.style.height     = horiz ? '1px'    : len+'px';
    lineDiv.style.background = `rgba(237,232,223,${rnd(.05,.22).toFixed(2)})`;
    lineDiv.style.left       = rnd(VW*.02, VW*.88) + 'px';
    placeEl(lineDiv, midPX + rnd(-VH*.78,VH*.68), rnd(.72,1.3), rnd(.08,.28), horiz ? rnd(-3,3) : rnd(-50,50));
  }

  // 10. DOTS
  for (let di = 0; di < 7; di++) {
    const ds    = rnd(3, 12);
    const dotD  = mkDiv('dot', '', '');
    dotD.style.width      = ds + 'px';
    dotD.style.height     = ds + 'px';
    dotD.style.background = Math.random() > .5 ? album.color : 'rgba(237,232,223,.52)';
    dotD.style.left       = rnd(VW*.02, VW*.94) + 'px';
    placeEl(dotD, midPX + rnd(-VH*.88,VH*.78), rnd(.44,1.48), rnd(.2,.76), 0, rnd(8,20), rnd(6,16));
  }

  // 11. GHOST RINGS
  for (let ci = 0; ci < 3; ci++) {
    const rs    = rnd(VW*.12, VW*.5);
    const ringD = mkDiv('ring', '', '');
    ringD.style.width       = rs + 'px';
    ringD.style.height      = rs + 'px';
    ringD.style.borderColor = album.color;
    ringD.style.left        = rnd(-rs*.3, VW*.75) + 'px';
    placeEl(ringD, midPX + rnd(-VH*.65,VH*.5), rnd(.34,.72), rnd(.04,.14), 0, rnd(12,24), rnd(8,18));
  }
});

/* ═══════════════════════════════════════════
   SCROLL + PARALLAX + DRIFT ENGINE
═══════════════════════════════════════════ */
let driftT = 0;

function update() {
  const scrollY  = window.scrollY;
  const maxScroll = scrollPX();
  const progress  = clamp(scrollY / maxScroll, 0, 1);
  const baseWorldY = -progress * worldPX();

  // Move the whole world
  world.style.transform = `translateY(${baseWorldY}px)`;

  const vpCtr = VH * 0.5;

  ELEMS.forEach(e => {
    // Parallax shift: elements with speed != 1 drift relative to scroll
    const pOffset = (e.parallax - 1) * scrollY * -0.28;

    // Screen-space center of element
    const screenCtr = e.worldY + baseWorldY + pOffset + 50;
    const dist = Math.abs(screenCtr - vpCtr);

    // Fade window
    const fullIn  = VH * 0.22;
    const fadeOut = VH * 1.18;
    let op = 0;
    if (dist < fullIn) {
      op = e.baseOp;
    } else if (dist < fadeOut) {
      const t = (dist - fullIn) / (fadeOut - fullIn);
      op = e.baseOp * Math.pow(1 - t, 1.7);
    }

    // Drift
    const dx = Math.sin(driftT * e.driftSpeed + e.driftPhase) * e.driftAmpX;
    const dy = Math.cos(driftT * e.driftSpeed * 1.4 + e.driftPhase + 1) * e.driftAmpY;

    e.node.style.opacity   = clamp(op, 0, 1);
    e.node.style.transform = `translate(${dx}px, ${pOffset + dy}px) rotate(${e.rot}deg)`;
  });
}

window.addEventListener('scroll', update, { passive: true });

// Drift loop (~30fps)
let lastDrift = 0;
function driftLoop(ts) {
  if (ts - lastDrift > 33) { driftT++; lastDrift = ts; update(); }
  requestAnimationFrame(driftLoop);
}
requestAnimationFrame(driftLoop);
update();

function openSub(page) {
  const overlay = document.getElementById('subpages');
  const content = document.getElementById('sp-content');
  overlay.classList.add('open');
  overlay.scrollTop = 0;
  content.innerHTML = buildPage(page);
}
function closeSub() {
  document.getElementById('subpages').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSub(); });

  if (page === 'projects') {
    return `<h1 class="sp-h">Projekty</h1>

        <div class="pj-row">

        <p>Fotografia jest dla mnie równorzędnym językiem ekspresji — dokumentuję te same przestrzenie, które nagrywam. Obraz i dźwięk wzajemnie się przenikają.</p>
